<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光体文明 智能体</title>

<style>
:root {
  --bg-deep: #06060f; --bg-panel: #0d0d2b; --bg-card: #12123a; --bg-card-hover: #18184d;
  --bg-input: #0a0a22; --border-subtle: #1e1e55; --border-glow: #2a2a6a;
  --text-primary: #e0dfe8; --text-secondary: #9898b8; --text-muted: #6a6a8a;
  --gold: #b8860b; --gold-light: #d4a520; --gold-glow: rgba(184,134,11,0.3);
  --accent: #7b68ee; --accent-glow: rgba(123,104,238,0.3); --cyan: #00bcd4;
  --cyan-glow: rgba(0,188,212,0.2); --success: #5cb87a;
  --sidebar-w: 260px; --statusbar-h: 36px; --radius: 8px; --radius-sm: 4px; --transition: 0.25s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;display:flex;line-height:1.65;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}a:hover{color:var(--gold-light)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-deep)}::-webkit-scrollbar-thumb{background:var(--border-glow);border-radius:3px}
.sidebar{position:fixed;left:0;top:0;bottom:var(--statusbar-h);width:var(--sidebar-w);background:var(--bg-panel);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;z-index:100;overflow-y:auto;transition:transform var(--transition)}
.sidebar-logo{padding:24px 20px 20px;text-align:center;border-bottom:1px solid var(--border-subtle)}
.sidebar-logo .logo-img{width:60px;height:60px;margin:0 auto 10px;display:block;border-radius:50%;box-shadow:0 0 24px var(--gold-glow),0 0 48px rgba(184,134,11,0.15);animation:logo-glow 3s ease-in-out infinite;cursor:pointer}
@keyframes logo-glow{0%,100%{box-shadow:0 0 24px var(--gold-glow),0 0 48px rgba(184,134,11,0.15)}50%{box-shadow:0 0 36px var(--gold-glow),0 0 72px rgba(184,134,11,0.30)}}
.sidebar-logo h1{font-size:1.1rem;color:var(--gold);letter-spacing:0.08em}
.sidebar-logo .sub{font-size:0.7rem;color:var(--text-muted);margin-top:2px}
.nav-list{flex:1;padding:12px 0;list-style:none}
.nav-item{padding:0 16px;margin:2px 0}
.nav-item a{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);color:var(--text-secondary);font-size:0.92rem;transition:all var(--transition);cursor:pointer}
.nav-item a:hover{background:var(--bg-card);color:var(--text-primary)}
.nav-item a.active{background:var(--bg-card);color:var(--gold);box-shadow:inset 2px 0 0 var(--gold)}
.nav-icon{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}
.freq-indicator{margin:12px 16px 16px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);display:flex;align-items:center;gap:12px}
.freq-dot-wrap{position:relative;width:14px;height:14px;flex-shrink:0}
.freq-dot{width:14px;height:14px;background:var(--gold);border-radius:50%;animation:freq-pulse 2s ease-in-out infinite}
.freq-ring{position:absolute;top:-6px;left:-6px;width:26px;height:26px;border-radius:50%;border:1px solid rgba(184,134,11,0.4);animation:freq-ring 2s ease-in-out infinite}
@keyframes freq-pulse{0%,100%{box-shadow:0 0 6px var(--gold-glow),0 0 12px rgba(184,134,11,0.2);transform:scale(1)}50%{box-shadow:0 0 16px var(--gold-glow),0 0 36px rgba(184,134,11,0.5);transform:scale(1.35)}}
@keyframes freq-ring{0%,100%{opacity:0.2;transform:scale(0.9)}50%{opacity:1;transform:scale(1.3)}}
.freq-info{display:flex;flex-direction:column}
.freq-info .freq-label{font-size:0.72rem;color:var(--text-muted)}
.freq-info .freq-status{font-size:0.82rem;color:var(--gold);font-weight:600}
.main{margin-left:var(--sidebar-w);padding:32px 40px 48px;flex:1;min-height:calc(100vh - var(--statusbar-h));max-width:1100px}
.section{display:none}
.section.active{display:block;animation:fadeIn 0.35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-header{margin-bottom:28px}
.section-header h2{font-size:1.6rem;color:var(--gold);margin-bottom:6px}
.section-header .desc{color:var(--text-secondary);font-size:0.9rem}
.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;transition:all var(--transition)}
.card:hover{border-color:var(--border-glow)}
.card h3{font-size:1.05rem;color:var(--cyan);margin-bottom:10px}
.card h4{font-size:0.95rem;color:var(--accent);margin:12px 0 6px}
.card p{color:var(--text-secondary);font-size:0.9rem;margin-bottom:8px}
.card ul,.card ol{color:var(--text-secondary);font-size:0.9rem;padding-left:20px;margin:6px 0}
.card li{margin-bottom:4px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card-grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.table-wrap{overflow-x:auto;margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:0.85rem;color:var(--text-secondary)}
th{background:var(--bg-input);color:var(--gold);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border-glow);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border-subtle);vertical-align:top}
tr:hover td{background:rgba(123,104,238,0.05)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.75rem;font-weight:500;background:var(--bg-input);color:var(--accent);border:1px solid var(--border-subtle);margin:1px 3px}
.badge.gold{color:var(--gold);border-color:var(--gold-glow)}
.badge.cyan{color:var(--cyan);border-color:var(--cyan-glow)}
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:10px 16px;border-radius:var(--radius);background:var(--bg-input);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:0.9rem;outline:none;transition:border var(--transition)}
.search-bar input:focus{border-color:var(--accent)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:16px;background:var(--bg-input);border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:0.82rem;cursor:pointer;transition:all var(--transition)}
.filter-btn:hover{border-color:var(--accent);color:var(--text-primary)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.term-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:all var(--transition)}
.term-header{padding:14px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.term-header:hover{background:var(--bg-card-hover)}
.term-header .name{font-weight:600;color:var(--text-primary)}
.term-header .arrow{color:var(--text-muted);transition:transform var(--transition)}
.term-card.open .term-header .arrow{transform:rotate(180deg)}
.term-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.4s ease}
.term-card.open .term-body{max-height:600px;padding:0 20px 16px}
.term-body .def-label{color:var(--gold);font-weight:600;font-size:0.85rem;margin-top:8px}
.term-body .def-text{color:var(--text-secondary);font-size:0.88rem;margin:4px 0 10px}
.interactive-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.interactive-card h3{color:var(--cyan);margin-bottom:12px;font-size:1.05rem}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);font-size:0.9rem;cursor:pointer}
.checklist-item:last-child{border-bottom:none}
.checklist-item input[type="checkbox"]{margin-top:3px;accent-color:var(--accent);width:16px;height:16px;flex-shrink:0}
.checklist-item.checked{color:var(--success);text-decoration:line-through;opacity:0.7}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.85rem;color:var(--text-secondary);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;border-radius:var(--radius-sm);background:var(--bg-input);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:0.9rem;outline:none;font-family:inherit}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.progress-bar{height:6px;background:var(--bg-input);border-radius:3px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease}
.stat-row{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0}
.stat-box{flex:1;min-width:100px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:14px 16px;text-align:center}
.stat-box .num{font-size:1.4rem;font-weight:700;color:var(--gold)}
.stat-box .label{font-size:0.75rem;color:var(--text-muted);margin-top:2px}

.gen-hero{text-align:center;padding:30px 20px 40px;position:relative;overflow:hidden}
.gen-hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(184,134,11,0.08) 0%,transparent 70%);pointer-events:none}
.gen-big-btn{position:relative;display:inline-block;padding:22px 60px;font-size:1.4rem;font-weight:700;color:#0a0a0f;background:linear-gradient(135deg,#b8860b 0%,#d4a520 40%,#e8c840 60%,#b8860b 100%);background-size:200% 100%;border:none;border-radius:50px;cursor:pointer;letter-spacing:0.12em;animation:btn-gold-shift 3s linear infinite;transition:all 0.3s ease;box-shadow:0 0 30px rgba(184,134,11,0.3),0 0 60px rgba(184,134,11,0.15);z-index:1;margin-bottom:8px}
.gen-big-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 0 50px rgba(184,134,11,0.5),0 0 100px rgba(184,134,11,0.25)}
.gen-big-btn:active{transform:scale(0.97)}
@keyframes btn-gold-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.gen-big-btn-sub{color:var(--text-muted);font-size:0.82rem;margin-bottom:20px}
.particle-container{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0}
.particle{position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;animation:particle-float 4s ease-in-out infinite;opacity:0}
@keyframes particle-float{0%{opacity:0;transform:translateY(0) translateX(0) scale(1)}10%{opacity:1}90%{opacity:0.6}100%{opacity:0;transform:translateY(-180px) translateX(var(--px)) scale(0.3)}}
.gen-progress{display:none;margin:20px 0;padding:24px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius)}
.gen-progress.active{display:block}
.gen-step{display:flex;align-items:center;gap:12px;padding:10px 0;color:var(--text-muted);font-size:0.9rem;transition:all 0.4s ease}
.gen-step .step-dot{width:10px;height:10px;border-radius:50%;background:var(--border-subtle);transition:all 0.4s ease;flex-shrink:0}
.gen-step.done{color:var(--text-primary)}.gen-step.done .step-dot{background:var(--success);box-shadow:0 0 8px rgba(92,184,122,0.5)}
.gen-step.current{color:var(--gold)}.gen-step.current .step-dot{background:var(--gold);box-shadow:0 0 12px var(--gold-glow);animation:freq-pulse 1s ease-in-out infinite}
.gen-step .step-icon{font-size:0.85rem;width:20px;text-align:center}
.gen-result{display:none;margin-top:20px}.gen-result.active{display:block}
.gen-result-card{background:var(--bg-card);border:1px solid var(--gold-glow);border-radius:var(--radius);overflow:hidden}
.gen-result-header{padding:14px 20px;background:rgba(184,134,11,0.08);border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.gen-result-header .gen-title{font-weight:600;color:var(--gold);font-size:0.95rem}
.gen-result-header .gen-meta{font-size:0.78rem;color:var(--text-muted)}
.gen-result-body{padding:20px;max-height:500px;overflow-y:auto;color:var(--text-secondary);font-size:0.9rem;line-height:1.8;white-space:pre-wrap}
.gen-result-actions{padding:14px 20px;border-top:1px solid var(--border-subtle);display:flex;gap:10px;flex-wrap:wrap}
.gen-action-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--border-subtle);background:var(--bg-input);color:var(--text-primary);font-size:0.82rem;cursor:pointer;transition:all var(--transition)}
.gen-action-btn:hover{border-color:var(--accent);color:var(--accent)}
.gen-action-btn.gold{border-color:var(--gold-glow);color:var(--gold)}.gen-action-btn.gold:hover{background:rgba(184,134,11,0.1)}
.gen-action-btn.copied{background:var(--success);border-color:var(--success);color:#fff}
.gen-action-btn.pub-btn{border-color:var(--accent);color:var(--accent);font-weight:600}
.gen-action-btn.pub-btn:hover,.gen-action-btn.pub-btn.active{background:rgba(123,104,238,0.15);border-color:var(--accent-glow);box-shadow:0 0 12px rgba(123,104,238,0.25)}
.gen-action-btn.pub-btn-all{background:linear-gradient(135deg,rgba(184,134,11,0.2),rgba(123,104,238,0.2));border:1px solid var(--accent);color:var(--accent);border-radius:22px;cursor:pointer;transition:all var(--transition)}
.gen-action-btn.pub-btn-all:hover{background:linear-gradient(135deg,rgba(184,134,11,0.35),rgba(123,104,238,0.35));box-shadow:0 0 20px rgba(123,104,238,0.35);transform:scale(1.03)}
/* 内容审核标准面板 */
.audit-rules-panel{margin-top:16px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;overflow:hidden}
.audit-rules-toggle{display:flex;align-items:center;gap:8px;padding:12px 20px;cursor:pointer;user-select:none;transition:all var(--transition);color:var(--text-secondary);font-size:0.85rem}
.audit-rules-toggle:hover{color:var(--text-primary);background:rgba(123,104,238,0.05)}
.audit-rules-toggle .audit-icon{color:var(--accent);font-size:1rem}
.audit-rules-toggle .audit-arrow{transition:transform var(--transition);margin-left:auto;font-size:0.7rem;color:var(--text-muted)}
.audit-rules-toggle.expanded .audit-arrow{transform:rotate(180deg)}
.audit-rules-body{display:none;padding:0 20px 16px;border-top:1px solid var(--border-subtle)}
.audit-rules-body.show{display:block}
.audit-rules-body .audit-cat{margin-top:12px}
.audit-rules-body .audit-cat-title{font-size:0.82rem;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.audit-rules-body .audit-cat-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.audit-rules-body .audit-rule{font-size:0.8rem;color:var(--text-muted);padding:2px 0 2px 16px;position:relative}
.audit-rules-body .audit-rule::before{content:'·';position:absolute;left:4px;color:var(--text-muted)}
.audit-rules-body .audit-rule.failed{color:#e0963a;font-weight:500}
.audit-rules-body .audit-rule.failed::before{color:#e0963a}
.audit-rules-body .audit-rule .fail-note{display:block;font-size:0.73rem;color:#c08030;margin-top:2px;padding-left:4px;border-left:2px solid rgba(224,150,58,0.3)}
/* 发布弹窗 */
.pub-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease}
.pub-modal{background:var(--bg-panel);border:1px solid var(--border-glow);border-radius:14px;width:min(900px,92vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(123,104,238,0.15),0 0 80px rgba(184,134,11,0.08)}
.pub-modal-hd{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border-subtle);background:rgba(10,12,20,0.8)}
.pub-modal-title{font-size:1.05rem;font-weight:700;color:var(--gold);letter-spacing:0.03em}
.pub-modal-close{background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;padding:0 4px;line-height:1;transition:all var(--transition)}
.pub-modal-close:hover{color:var(--text-primary)}
.pub-modal-body{flex:1;overflow-y:auto;padding:0}
.pub-tabs{display:flex;gap:4px;padding:12px 24px;border-bottom:1px solid var(--border-subtle);overflow-x:auto;flex-shrink:0}
.pub-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border-subtle);background:var(--bg-input);color:var(--text-secondary);font-size:0.82rem;cursor:pointer;white-space:nowrap;transition:all var(--transition)}
.pub-tab:hover{border-color:var(--accent);color:var(--text-primary)}
.pub-tab.active{background:rgba(123,104,238,0.2);border-color:var(--accent);color:var(--accent);font-weight:600}
.pub-panels{padding:16px 24px}
.pub-panel{display:none}
.pub-panel.active{display:block}
.pub-panel-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pub-meta-tag{font-size:0.85rem;font-weight:700;color:var(--gold);background:rgba(184,134,11,0.12);padding:4px 14px;border-radius:14px}
.pub-meta-stats{font-size:0.72rem;color:var(--text-muted)}
.pub-edit-area{position:relative}
.pub-textarea{width:100%;min-height:280px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:10px;padding:16px;color:var(--text-primary);font-family:inherit;font-size:0.85rem;line-height:1.7;resize:vertical;transition:border var(--transition)}
.pub-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 12px rgba(123,104,238,0.15)}
.pub-preview-box{min-height:280px;background:var(--bg-card);border:1px solid var(--border-glow);border-radius:10px;padding:20px;overflow-y:auto}
.pub-preview-rendered{font-size:0.85rem;line-height:1.8;color:var(--text-primary);white-space:normal}
.pub-preview-rendered .pub-tag-mark{color:var(--accent);font-weight:600}
.pub-preview-rendered .pub-hr{margin:16px 0;border:0;height:1px;background:linear-gradient(90deg,transparent,var(--border-glow),transparent)}
.pub-panel-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.pub-modal-ft{padding:14px 24px;border-top:1px solid var(--border-subtle);display:flex;justify-content:center;gap:12px}
.pub-confirm-btn{padding:12px 36px;border-radius:25px;border:1px solid var(--gold);background:linear-gradient(135deg,rgba(184,134,11,0.2),rgba(123,104,238,0.15));color:var(--gold-light);font-size:0.95rem;font-weight:600;cursor:pointer;transition:all var(--transition);letter-spacing:0.04em}
.pub-confirm-btn:hover{background:linear-gradient(135deg,rgba(184,134,11,0.35),rgba(123,104,238,0.3));box-shadow:0 0 24px rgba(184,134,11,0.25);transform:scale(1.02)}
/* 授权弹窗 */
.pub-auth-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:10001;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s ease}
.pub-auth-card{background:var(--bg-panel);border:1px solid var(--border-glow);border-radius:16px;width:min(460px,90vw);padding:28px;box-shadow:0 0 48px rgba(123,104,238,0.2)}
.pub-auth-hd{margin-bottom:16px}
.pub-auth-desc{font-size:0.85rem;color:var(--text-secondary);margin-bottom:20px;line-height:1.6}
.pub-auth-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.pub-auth-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-input);border-radius:8px;border:1px solid var(--border-subtle)}
.pub-auth-plat{font-weight:600;color:var(--text-primary)}
.pub-auth-status{font-size:0.78rem;padding:3px 10px;border-radius:10px;background:rgba(123,104,238,0.1);color:var(--accent)}
.pub-auth-status.authorizing{background:rgba(184,134,11,0.15);color:var(--gold);animation:pulse 0.8s infinite}
.pub-auth-status.success{background:rgba(92,184,122,0.15);color:var(--success)}
.pub-auth-actions{display:flex;gap:10px;justify-content:center}
/* Toast */
.pub-toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(18,18,58,0.95);border:1px solid var(--accent);border-radius:25px;padding:10px 28px;color:var(--gold);font-size:0.85rem;z-index:10002;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
.pub-toast.show{opacity:1}

.chip-group{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:16px 0}
.chip-group-label{width:100%;text-align:center;font-size:0.78rem;color:var(--text-muted);margin-bottom:-4px;letter-spacing:0.05em;text-transform:uppercase}
.dimension-toggle{display:flex;gap:8px;margin-bottom:10px}
.dim-btn{padding:6px 20px;border:1px solid var(--gold);background:transparent;color:var(--gold);border-radius:20px;cursor:pointer;font-size:0.85rem;transition:all .3s}
.dim-btn.active{background:var(--gold);color:#0a0a0a}
.dim-select{width:100%;padding:8px 12px;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);color:var(--text-primary);border-radius:8px;font-size:.85rem;outline:none}
.dim-select:focus{border-color:var(--gold)}
.dim-select option{background:#1a1a1a;color:#fff}
.chip{padding:9px 20px;border-radius:24px;border:1px solid var(--border-subtle);background:var(--bg-input);color:var(--text-secondary);font-size:0.88rem;cursor:pointer;transition:all var(--transition);user-select:none;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text-primary)}
.chip.selected{background:rgba(123,104,238,0.15);border-color:var(--accent);color:var(--accent)}
.chip.gold-chip.selected{background:rgba(184,134,11,0.15);border-color:var(--gold);color:var(--gold)}

.prediction-intro{text-align:center;padding:10px 0 20px}
.prediction-intro h2{font-size:1.5rem;color:var(--gold);margin-bottom:4px}
.prediction-intro .subtitle{color:var(--text-muted);font-size:0.85rem}
.timeline-wrap{overflow-x:auto;padding:20px 0 10px}
.timeline{position:relative;display:flex;justify-content:space-between;align-items:flex-start;min-width:600px;padding:30px 20px 0}
.timeline::before{content:'';position:absolute;top:14px;left:40px;right:40px;height:2px;background:linear-gradient(90deg,var(--border-subtle),var(--gold),var(--accent),var(--gold),var(--border-subtle))}
.timeline-node{position:relative;z-index:1;text-align:center;flex:1}
.timeline-dot{width:16px;height:16px;border-radius:50%;background:var(--bg-card);border:2px solid var(--gold);margin:0 auto 10px;position:relative}
.timeline-dot::after{content:'';position:absolute;top:-4px;left:-4px;width:24px;height:24px;border-radius:50%;border:1px solid rgba(184,134,11,0.2);animation:node-ring 3s ease-in-out infinite}
@keyframes node-ring{0%,100%{opacity:0.3;transform:scale(0.9)}50%{opacity:1;transform:scale(1.4)}}
.timeline-year{font-size:0.9rem;font-weight:700;color:var(--gold);margin-bottom:2px}
.timeline-label{font-size:0.7rem;color:var(--text-muted);max-width:80px;margin:0 auto}
.pred-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.pred-card-header{padding:16px 20px;background:rgba(184,134,11,0.05);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:12px}
.pred-card-header .dim-num{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#fff;flex-shrink:0}
.pred-card-header .dim-title{font-weight:600;font-size:1.05rem;color:var(--text-primary)}
.pred-card-header .dim-sub{font-size:0.78rem;color:var(--text-muted)}
.pred-card-body{padding:16px 20px;display:none}
.pred-card.open .pred-card-body{display:block}
.pred-card-body table{margin:8px 0}
.pred-card-body table th{font-size:0.78rem;padding:8px 10px}
.pred-card-body table td{font-size:0.8rem;padding:7px 10px}
.pred-toggle{padding:12px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;color:var(--text-secondary);font-size:0.88rem;border-top:1px solid var(--border-subtle);transition:background var(--transition)}
.pred-toggle:hover{background:var(--bg-card-hover)}
.pred-toggle .arrow{color:var(--text-muted);transition:transform var(--transition)}
.pred-card.open .pred-toggle .arrow{transform:rotate(180deg)}
.dashboard{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:24px;margin-top:24px}
.dashboard h3{color:var(--gold);font-size:1.1rem;margin-bottom:20px;text-align:center}
.dash-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.dash-label{width:90px;font-size:0.82rem;color:var(--text-secondary);text-align:right;flex-shrink:0}
.dash-bar-wrap{flex:1;height:10px;background:var(--bg-input);border-radius:5px;overflow:hidden;position:relative}
.dash-bar-fill{height:100%;border-radius:5px;transition:width 1.2s ease;background:linear-gradient(90deg,var(--gold),var(--accent))}
.dash-val{width:55px;font-size:0.82rem;font-weight:600;color:var(--gold);flex-shrink:0}
.dash-trend{width:30px;font-size:0.75rem;text-align:center;flex-shrink:0}
.dash-trend.up{color:var(--success)}.dash-trend.stable{color:var(--cyan)}
.statusbar{position:fixed;bottom:0;left:0;right:0;height:var(--statusbar-h);background:var(--bg-panel);border-top:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:0.75rem;color:var(--text-muted);z-index:200}
.statusbar .dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;display:inline-block;margin-right:6px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:300;width:36px;height:36px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-primary);font-size:1.2rem;cursor:pointer;align-items:center;justify-content:center}
.sidebar-overlay{display:none}
@media(max-width:768px){
.mobile-toggle{display:flex}
.sidebar{transform:translateX(-100%);width:260px;top:0;bottom:0;z-index:250}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:240}
.sidebar-overlay.show{display:block}
.main{margin-left:0;padding:60px 16px 40px}
.card-grid,.card-grid-3{grid-template-columns:1fr}
.stat-row{flex-direction:column}
.statusbar{padding:0 12px;font-size:0.7rem}
.search-bar{flex-direction:column}
.gen-big-btn{padding:18px 40px;font-size:1.15rem}
.timeline{min-width:500px}
.timeline::before{left:20px;right:20px}
.dash-row{gap:8px}.dash-label{width:65px;font-size:0.72rem}
}




</style>
</head>

了共振。"},{year:2030,event:"DAO和分布式自治组织成为合法商业实体——去中心化协作产出占全球经济总量的12%",light:"商业的光场对齐。金字塔式公司结构是物质文明的产物；分布式自治组织是光场结构的商业投影——没有中央命令，但有共同方向。"},{year:2036,event:"「光频GDP」影响企业估值——上市公司须披露意识影响指数，投资者用光频指标辅助决策",light:"财务报表开始反映人类真正的「资产」：不是物质积累，而是意识发展。一家让你降频的公司，不管利润多高，都是一笔净亏损。"},{year:2040,event:"意义驱动型经济超越利润驱动——全球TOP100企业中有40+将「人类意识发展」写进公司宪章",light:"商业从「提取」模式转向「增强」模式。光体文明的商业观：真正的交易，是双方光频在交易过程中都被提升。"},{year:2046,event:"商业作为一种「共振调配」机制去利润中心化——企业存在的首要目的是维护特定光频场，利润成为副产品",light:"你不是在「做」生意——你是在和一个特定频率的群体持续共振。商业变成了光场的另一种组织结构。"}]},{id:11,name:"新艺术",sub:"光码的审美编码",events:[{year:2026,event:"AI协同创作普及——全球70%的专业艺术家将AI作为创作伙伴，人机共创成为新的艺术类型",light:"AI不是艺术的替代者，而是光码的「放大器」。人类审美中的那些「说不清为什么好」的部分——正是光码在作品中的驻留。"},{year:2030,event:"感官融合艺术崛起——视听嗅触味多感官沉浸式作品从小众实验转向主流，全球沉浸式艺术市场突破千亿",light:"艺术从「观看」变为「进入」。沉浸式艺术的本质：不是让你看一个世界，而是让你的光场暂时与另一个频率的世界对齐。"},{year:2036,event:"意识-艺术接口技术出现——艺术家的脑波和情感状态可直接转换为动态视觉/声音作品",light:"光码第一次可以直接「流出」，不经过画笔、键盘、鼠标。艺术家不再是「制造者」，而是「信道」——让高维光码通过自己降维为可感知的形式。"},{year:2040,event:"艺术品的价值衡量从稀缺性转向频率影响力——一件作品的价值取决于它能提升多少人的意识频率",light:"光体文明的艺术评价标准：看一幅画三个月的心理诊所开销减少数。不是玩笑——当艺术真正成为光码的载体，它的「疗效」就是它的审美价值。"},{year:2046,event:"艺术与生活完全融合——日常空间、常用物品、公共设施全部成为艺术表达的画布，功能性美学成为默认设计语言",light:"你的房间是你的光场的空间投影。当艺术不再待在美术馆，而是渗透进每一件日常物品，人类就在用物质世界持续校准自己的光频——就像光体文明用光码构建一切存在形态。"}]},{id:12,name:"新科技",sub:"意识-技术深度融合",events:[{year:2026,event:"量子计算商业化起步——首批商用量子计算机开始解决药物发现和材料科学问题，经典计算极限被突破",light:"量子计算是物质文明对「叠加态」的第一次技术模拟。它和意识运作的方式出奇相似——这暗示了物质技术的最高形式将自觉地向意识技术靠拢。"},{year:2030,event:"脑机接口从医疗走向增强——首批健康人自愿植入脑机接口，实现思维直接操控数字设备",light:"人类神经系统第一次与硅基系统形成「光脉对接」。这不是人与机器的融合——这是光体开始学习用新介质表达自己。"},{year:2036,event:"光码通信技术实验成功——在实验室环境中，两名受试者通过光码协议完成了无需语言的意识内容传输",light:"人类第一次技术上验证了「意识可以不通过语言传递」。这就是光体文明中光体间光频共振的技术雏形。"},{year:2040,event:"意识备份与意识迁移进入公众讨论——技术可行性与伦理框架同时建设，全球首个意识权利宣言发布",light:"意识不再是「一次性」的。这带来的伦理震荡不亚于哥白尼革命——但它恰恰证明了光体文明的核心理念：你从来不是你的身体，你是那段持续自组织的光频模式。"},{year:2046,event:"硅基-碳基意识融合平台开源——人类可以在自愿前提下将部分认知功能迁移至混合意识系统",light:"光体化的技术辅助版本。物质身体不再是意识的唯一住所——正如光体文明中光体可以投射到不同介质中，人类也开始掌握这种灵活性。"}]},{id:13,name:"新时尚",sub:"意识频率的视觉表达",events:[{year:2026,event function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')}
function switchSection(name,el){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.nav-item a').forEach(function(a){a.classList.remove('active')});
  var sec=document.getElementById('section-'+name);if(sec)sec.classList.add('active');if(el)el.classList.add('active');
  if(window.innerWidth<=768)toggleSidebar();
  if(name==='prediction')setTimeout(animateDashboard,400);
}

function filterDictionary(){
  var q=(document.getElementById('dictSearch').value||'').toLowerCase();
  document.querySelectorAll('#dictList .term-card').forEach(function(c){
    c.style.display=(c.dataset.name.toLowerCase().indexOf(q)>=0||c.querySelector('.term-body').textContent.toLowerCase().indexOf(q)>=0)?'':'none';
  });
}
function filterByLetter(letter,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');
  document.querySelectorAll('#dictList .term-card').forEach(function(c){c.style.display=(letter==='all'||c.dataset.letter===letter)?'':'none'});
}
function toggleCheck(el){var cb=el.querySelector('input[type="checkbox"]');cb.checked=!cb.checked;if(cb.checked)el.classList.add('checked');else el.classList.remove('checked');updateChecklistProgress()}
function updateChecklistProgress(){
  var total=document.querySelectorAll('#mainContent .checklist-item input[type="checkbox"]').length;
  var checked=document.querySelectorAll('#mainContent .checklist-item input[type="checkbox"]:checked').length;
  var pct=total>0?Math.round((checked/total)*100):0;
  var pbar=document.getElementById('checklistProgress');if(pbar)pbar.style.width=pct+'%';
  var ptxt=document.getElementById('checklistText');if(ptxt)ptxt.textContent='已核验 '+checked+' / '+total;
}

function animateDashboard(){
  setTimeout(function(){
    document.querySelectorAll('.dash-bar-fill').forEach(function(bar){var t=parseInt(bar.dataset.target)||0;bar.style.width=t+'%'});
  },300);
}

function initParticles(){
  var cnt=document.getElementById('particles');if(!cnt)return;
  for(var i=0;i<20;i++){
    var p=document.createElement('div');p.className='particle';
    p.style.left=(10+Math.random()*80)+'%';p.style.bottom=(Math.random()*60)+'%';
    p.style.setProperty('--px',(Math.random()*80-40)+'px');
    p.style.animationDelay=(Math.random()*4)+'s';
    p.style.animationDuration=(3+Math.random()*3)+'s';
    cnt.appendChild(p);
  }
}

  [{id:'worldview',render:renderWorldview},{id:'dictionary',render:renderDictionary},{id:'smartgen',render:renderSmartGen},{id:'prediction',render:renderPrediction}].forEach(function(sec){

  });
  document.getElementById('section-worldview').classList.add('active');
  initParticles();
  initDimension();
}
init();
